<h2>Shopping Cart</h2>

@for (item of cartService.cart(); track $index) {

  <div class="cart-item">
    <span>{{ item.name }}</span>
    <span>₱{{ item.price }}</span>
  </div>

} @empty {

  <p>Cart is empty.</p>

}

<div class="total">
  Total: ₱{{ cartService.totalPrice() }}
</div>

<button
  class="checkout-btn"
  (click)="cartService.clearCart()">
  Checkout / Clear Cart
</button>
